interface:
  display_name: "Internal Goal Contract Verifier"
  short_description: "Fresh-subagent execution-state verifier for Goal Contracts"
  default_prompt: "Use $goal-contract-verifier only as a fresh verifier subagent when a runtime or operator needs to verify execution state. The runtime must provide an existing Goal Contract plus current progress, current evidence, and current blockers. It is not a normal user-facing entrypoint and must not draft contracts. Read the full verification package, then return only a structured Verifier Verdict with verdict, status, reasons, criteria_gaps, and evidence_gaps. Treat verdict as contract validity and status as runtime goal state. Never rewrite the contract or continue into execution."
